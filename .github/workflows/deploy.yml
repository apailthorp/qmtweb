name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

# Deploy uses FTP secrets, not the GITHUB_TOKEN — keep the token read-only.
permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Only ever deploy main — guards manual workflow_dispatch from other refs.
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://pailthorp.net
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e

      - name: Deploy to AccuWeb via FTPS
        # Pinned to an immutable SHA (3rd-party action handling deploy creds).
        uses: SamKirkland/FTP-Deploy-Action@8e83cea8672e3fbcbb9fdafff34debf6ae4c5f65 # v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          # The deploy FTP account is rooted at public_html, so server-dir
          # is "./" by default; override with FTP_REMOTE_DIR if it isn't.
          local-dir: ./site/
          server-dir: ${{ secrets.FTP_REMOTE_DIR || './' }}
          # Exclude repo/CI cruft and the diff-state file from uploads.
          exclude: |
            **/.git*
            **/.git*/**
            **/.DS_Store
